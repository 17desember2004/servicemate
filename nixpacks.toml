[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader"]
 
[phases.build]
cmds = [
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache"
]
 
[start]
cmd = "php artisan migrate --force && php artisan db:seed --class=BengkelSeeder --force && php artisan schedules:check-overdue && (while true; do php artisan schedule:run; sleep 60; done &) && php artisan serve --host=0.0.0.0 --port=${PORT}"
 